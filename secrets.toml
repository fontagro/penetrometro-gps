# ──────────────────────────────────────────────
# Penetrómetro GPS Mapper — Configuración
# ──────────────────────────────────────────────
# Colocar este archivo en: .streamlit/secrets.toml
#
# Para obtener el token de Dropbox:
#   1. Ir a https://www.dropbox.com/developers/apps
#   2. Crear una app (Scoped access → Full Dropbox)
#   3. En la pestaña Permissions, habilitar: files.metadata.read, files.content.read
#   4. En Settings, generar un Access Token
# ──────────────────────────────────────────────

DROPBOX_ACCESS_TOKEN = "TU_TOKEN_AQUI"
DROPBOX_FOLDER = "/Penetrometro"
